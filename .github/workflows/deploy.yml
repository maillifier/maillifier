# ============================================================
# maillifier — CI/CD
# Repo: github.com/maillifier/maillifier (public PROD)
# ============================================================
# On push/merge to main: clasp push → PROD Apps Script project
# ============================================================
# Required GitHub Secrets:
#   CLASPRC_JSON_PROD — contents of ~/.clasprc.json (vidnoe.soap3@gmail.com)
# ============================================================

name: Deploy GAS to PROD

on:
  push:
    branches: [main]

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON_PROD }}
        run: echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Create .clasp.json
        run: |
          echo '{
            "scriptId": "1hzMMCCabCexYoIQhYboAzjCzWr5l9xMrDCkel0SnBdnQxQITzE7kqwo_",
            "rootDir": "."
          }' > .clasp.json

      - name: Push to Apps Script
        run: clasp push --force

      - name: Deployment summary
        run: |
          echo "✅ Deployed to PROD Apps Script"
          echo "   Script ID: 1hzMMCCabCexYoIQhYboAzjCzWr5l9xMrDCkel0SnBdnQxQITzE7kqwo_"
          echo "   Files pushed:"
          ls -1 *.gs appsscript.json 2>/dev/null | sed 's/^/     /'
